<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Tin Học 12 - Nhóm 7</title>
    
    <style>
        /* --- CẤU HÌNH CHUNG (Hệ Neon Dark) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: radial-gradient(circle at top, #1f1c2c, #0f0c29); min-height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden; padding: 10px; }

        .container { 
            width: 95%; max-width: 1100px; height: 90vh; background: #111; 
            border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(0, 245, 255, 0.2); 
            display: flex; flex-direction: column; border: 1px solid #333; 
        }

        /* --- BANNER --- */
        .banner { 
            height: 130px; background: #000; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 40px; border-bottom: 3px solid #00f5ff; 
        }
        .logo-school { height: 90px; transition: 0.4s; filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.3)); }
        .banner-text { 
            color: #00f5ff; font-size: clamp(25px, 5vw, 50px); font-weight: 900; 
            letter-spacing: 10px; text-transform: uppercase; text-shadow: 0 0 10px #00f5ff; 
        }

        /* --- PHẦN THÂN --- */
        .main { flex: 1; display: flex; overflow: hidden; }
        .menu { width: 260px; background: #0a0a0a; padding-top: 30px; border-right: 1px solid #222; flex-shrink: 0; }
        .menu a { display: block; padding: 18px 30px; color: #888; text-decoration: none; transition: 0.3s; font-weight: 500; border-left: 3px solid transparent; cursor: pointer; }
        .menu a:hover { color: #00f5ff; background: rgba(0, 245, 255, 0.05); padding-left: 40px; border-left: 3px solid #00f5ff; }

        /* --- NỘI DUNG --- */
        .content { flex: 1; padding: 40px; background: #111; overflow-y: auto; scroll-behavior: smooth; }
        .glow-box { animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: rgba(255, 255, 255, 0.03); padding: 25px; border-radius: 12px; border: 1px solid #222; margin-bottom: 20px; }
        h1 { color: #00f5ff; text-transform: uppercase; margin-bottom: 20px; border-left: 5px solid #ff0000; padding-left: 15px; }
        h2 { color: #00f5ff; font-size: 20px; margin-bottom: 10px; }
        h3 { color: #00f5ff; margin: 15px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }

        /* Style Form */
        label { display: block; margin-bottom: 5px; color: #bbb; }
        input[type="text"], input[type="email"], textarea {
            width: 100%; padding: 10px; background: #222; border: 1px solid #444; 
            color: white; border-radius: 5px; margin-bottom: 15px;
        }
        .checkbox-item { display: flex; align-items: center; margin-bottom: 8px; cursor: pointer; color: #888; }
        .checkbox-item input { margin-right: 10px; }
        
        .btn-neon {
            width: 100%; padding: 12px; background: transparent; border: 2px solid #00f5ff; 
            color: #00f5ff; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-neon:hover { background: #00f5ff; color: #000; box-shadow: 0 0 20px #00f5ff; }

        .footer { margin-top: 40px; font-size: 12px; color: #444; text-align: right; border-top: 1px solid #222; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="banner">
            <img src="https://tse2.mm.bing.net/th/id/OIP.uL3K8bRQQ6oQJuWJBlbyVgAAAA?rs=1&pid=ImgDetMain&o=7&rm=3" class="logo-school" alt="Logo">
            <div class="banner-text">NHÓM 7</div>
            <div style="width:90px"></div>
        </div>

        <div class="main">
            <div class="menu">
                <a onclick="hienNoiDung('gioithieu')">Giới thiệu thành viên</a>
                <a onclick="hienNoiDung('tkb')">Thời khóa biểu</a>
                <a onclick="hienNoiDung('tinhoc12')">Chương trình Tin 12</a>
                <a onclick="hienNoiDung('nghenghiep')">Định hướng nghề nghiệp</a>
                <a onclick="hienNoiDung('hoithao')">Đăng ký hội thao</a>
                <a onclick="hienNoiDung('gopy')">Góp ý thư viện</a>
            </div>

            <div class="content" id="vung_hien_thi">
                <div class="glow-box">
                    <h1>WELCOME 👾</h1>
                    <p>Chào mừng đến với sản phẩm của <strong>Nhóm 7 - Lớp 12A9</strong>.</p>
                    <p style="color: #888; margin-top: 10px;">Chọn menu bên trái để bắt đầu khám phá.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function hienNoiDung(phan) {
            let nd = "";
            const v = document.getElementById("vung_hien_thi");

            if (phan === 'gioithieu') {
                nd = `<div class="glow-box"><h1>GIỚI THIỆU THÀNH VIÊN</h1><div class="card"><h2>1. Hồ Nguyễn Gia Bảo</h2><p>Đam mê kỹ thuật điện...</p></div></div>`;
            } 
            else if (phan === 'tkb') {
                nd = `<div class="glow-box"><h1>THỜI KHÓA BIỂU</h1><div class="card">Dữ liệu thời khóa biểu...</div></div>`;
            }
            // --- FORM ĐĂNG KÝ HỘI THAO ---
            else if (phan === 'hoithao') {
                nd = `
                <div class="glow-box">
                    <h1>ĐĂNG KÝ HỘI THAO</h1>
                    <div class="card">
                        <form onsubmit="xuLyHoiThao(event)">
                            <label>Họ và tên:</label>
                            <input type="text" required placeholder="Nhập tên của bạn...">
                            <label>Email:</label>
                            <input type="email" required placeholder="email@vi-du.com">
                            <label>Lớp:</label>
                            <div style="margin-bottom:15px">
                                <input type="radio" name="g" required> 10 &nbsp;
                                <input type="radio" name="g"> 11 &nbsp;
                                <input type="radio" name="g"> 12
                            </div>
                            <label>Môn thi đấu:</label>
                            <div class="checkbox-item"><input type="checkbox"> Bóng bàn</div>
                            <div class="checkbox-item"><input type="checkbox"> Cầu lông</div>
                            <div class="checkbox-item"><input type="checkbox"> Cờ vua</div>
                            <button type="submit" class="btn-neon">XÁC NHẬN ĐĂNG KÝ</button>
                        </form>
                    </div>
                </div>`;
            }
            // --- FORM GÓP Ý THƯ VIỆN ---
            else if (phan === 'gopy') {
                nd = `
                <div class="glow-box">
                    <h1>GÓP Ý THƯ VIỆN</h1>
                    <div class="card">
                        <form onsubmit="xuLyGopY(event)">
                            <label>Họ và tên:</label>
                            <input type="text" required>
                            <label>Nội dung góp ý:</label>
                            <textarea placeholder="Nhập ý kiến của bạn..."></textarea>
                            <button type="submit" class="btn-neon">GỬI GÓP Ý</button>
                        </form>
                    </div>
                </div>`;
            }

            v.innerHTML = nd + '<div class="footer">© 2026 - Nhóm 7 THPT Ngô Quyền | Lớp 12A9</div>';
        }

        // Xử lý phản hồi Hội Thao
        function xuLyHoiThao(event) {
            event.preventDefault();
            document.getElementById("vung_hien_thi").innerHTML = `
                <div class="glow-box" style="text-align:center; padding-top:50px;">
                    <h1 style="border:none; color:#00f5ff">CẢM ƠN BẠN ĐÃ PHẢN HỒI!</h1>
                    <div class="card">
                        <p>Thông tin đăng ký hội thao của bạn đã được ghi nhận thành công. </p>
                        <button class="btn-neon" style="width:200px; margin-top:20px" onclick="hienNoiDung('hoithao')">QUAY LẠI</button>
                    </div>
                </div>`;
        }

        // Xử lý phản hồi Góp Ý
        function xuLyGopY(event) {
            event.preventDefault();
            document.getElementById("vung_hien_thi").innerHTML = `
                <div class="glow-box" style="text-align:center; padding-top:50px;">
                    <h1 style="border:none; color:#00f5ff">CẢM ƠN BẠN ĐÃ GÓP Ý!</h1>
                    <div class="card">
                        <p>Chúng tôi đã nhận được ý kiến của bạn và sẽ cải thiện thư viện tốt hơn.</p>
                        <button class="btn-neon" style="width:200px; margin-top:20px" onclick="hienNoiDung('gopy')">QUAY LẠI</button>
                    </div>
                </div>`;
        }
    </script>
</body>
</html>
