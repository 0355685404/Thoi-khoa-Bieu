<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Tin Học 12 - Nhóm 7</title>
    
    <style>
        /* --- CẤU HÌNH CHUNG --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', 'Times New Roman', sans-serif; }
        body { background: radial-gradient(circle at top, #1f1c2c, #0f0c29); height: 100vh; display: flex; justify-content: center; align-items: center; color: white; overflow: hidden; }

        /* --- KHUNG CHÍNH --- */
        .container { width: 1100px; height: 750px; background: #111; border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(0, 255, 255, 0.2); display: flex; flex-direction: column; border: 1px solid #333; }

        /* --- BANNER --- */
        .banner { height: 130px; background: #000; display: flex; align-items: center; justify-content: center; position: relative; border-bottom: 3px solid #00f5ff; }
        .logo-school { position: absolute; left: 40px; height: 90px; transition: all 0.4s; cursor: pointer; filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.2)); }
        .logo-school:hover { transform: scale(1.1); filter: drop-shadow(0 0 20px #00f5ff); }
        .banner-text { color: #00f5ff; font-size: 50px; font-weight: 900; letter-spacing: 10px; text-transform: uppercase; text-shadow: 0 0 10px #00f5ff; }

        /* --- PHẦN THÂN --- */
        .main { flex: 1; display: flex; overflow: hidden; }
        .menu { width: 260px; background: #0a0a0a; padding-top: 30px; border-right: 1px solid #222; }
        .menu a { display: block; padding: 18px 30px; color: #888; text-decoration: none; transition: 0.3s; font-weight: 500; }
        .menu a:hover { color: #00f5ff; background: rgba(0, 245, 255, 0.05); padding-left: 40px; }

        /* --- VÙNG HIỂN THỊ NỘI DUNG --- */
        .content { flex: 1; padding: 40px; background: #111; overflow-y: auto; color: #ddd; }
        
        /* CSS Hỗ trợ hiển thị bảng và nội dung từ các trang con */
        .glow-box { animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; background: rgba(255, 255, 255, 0.05); }
        th, td { border: 1px solid #444; padding: 10px; text-align: center; }
        th { background: #00f5ff; color: #000; }
        .tieu-de-buoi { color: #00f5ff; font-weight: bold; margin-top: 20px; border-left: 4px solid #ff0000; padding-left: 10px; }
        
        .personal-section { margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .personal-section h2 { color: #00f5ff; margin-bottom: 10px; }
        .link-them { color: #ff0000; text-decoration: underline; }
        
        .footer { margin-top: 40px; font-size: 12px; color: #555; text-align: right; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="banner">
            <img src="OIP (2).webp" class="logo-school" alt="Logo">
            <div class="banner-text">NHÓM 7</div>
        </div>

        <div class="main">
            <div class="menu">
                <a href="#" onclick="hienNoiDung('gioithieu')">Giới thiệu thành viên</a>
                <a href="#" onclick="hienNoiDung('tkb')">Thời khóa biểu</a>
                <a href="#" onclick="hienNoiDung('tinhoc12')">Chương trình Tin 12</a>
                <a href="#" onclick="hienNoiDung('nghenghiep')">Định hướng nghề nghiệp</a>
            </div>

            <div class="content" id="vung_hien_thi">
                <div class="glow-box">
                    <h1 style="color: #00f5ff;">WELCOME 👾</h1>
                    <p style="margin-top: 20px;">Chào mừng thầy/cô và các bạn đến với sản phẩm của Nhóm 7 - Lớp 12A9.</p>
                    <p>Vui lòng chọn các mục ở menu bên trái để xem chi tiết.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function hienNoiDung(phan) {
            let nd = "";
            const v = document.getElementById("vung_hien_thi");

            if (phan === 'gioithieu') {
                nd = `
                <div class="glow-box">
                    <h1 style="text-align:center; color:#00f5ff; text-decoration:underline;">GIỚI THIỆU THÀNH VIÊN</h1>
                    <div class="personal-section">
                        <h2>1. Hồ Nguyễn Gia Bảo (17 tuổi)</h2>
                        <p>Tính cách năng động, ham học hỏi. Đam mê <strong>nghiên cứu đồ điện</strong> và kỹ thuật.</p>
                        <ul><li>Tư duy logic</li><li>Tỉ mỉ, cẩn thận</li></ul>
                    </div>
                    <div class="personal-section">
                        <h2>2. Trịnh Tuấn Anh (17 tuổi)</h2>
                        <p>Điềm tĩnh, thích sáng tạo. Sở thích: <strong>Xem phim</strong> và <strong>Lắp ráp mô hình (Chơi nhựa)</strong>.</p>
                        <ul><li>Rèn luyện kiên nhẫn</li><li>Tư duy hình khối</li></ul>
                    </div>
                </div>`;
            } 
            
            else if (phan === 'tkb' || phan === 'tinhoc12') {
                nd = `
                <div class="glow-box">
                    <h1 style="color:#00f5ff; text-align:center;">THỜI KHÓA BIỂU 12A9</h1>
                    <p style="text-align:center;">Áp dụng từ 01/12/2025</p>
                    <div class="tieu-de-buoi">Buổi sáng</div>
                    <table>
                        <tr><th>Tiet</th><th>T2</th><th>T3</th><th>T4</th><th>T5</th><th>T6</th><th>T7</th></tr>
                        <tr><td>1</td><td>HĐ TN</td><td>HÓA</td><td>SỬ</td><td>ANH</td><td>HÓA</td><td>TOÁN ÔN</td></tr>
                        <tr><td>2</td><td>HĐ TN</td><td>ANH</td><td>SINH</td><td>TOÁN</td><td>TN HN</td><td>TOÁN ÔN</td></tr>
                        <tr><td>3</td><td>SINH</td><td>VĂN</td><td>TOÁN</td><td>LÝ</td><td>GD TC</td><td>VĂN ÔN</td></tr>
                        <tr><td>4</td><td>LÝ</td><td>HÓA</td><td>TOÁN</td><td>GD ĐP</td><td>GD TC</td><td>VĂN ÔN</td></tr>
                    </table>
                    <div class="tieu-de-buoi">Buổi chiều</div>
                    <table>
                        <tr><th>Tiet</th><th>T2</th><th>T3</th><th>T4</th><th>T5</th><th>T6</th></tr>
                        <tr><td>1</td><td>LÝ</td><td>TC</td><td>TC-ÔN</td><td>TOÁN</td><td>GDQP</td></tr>
                        <tr><td>2</td><td>TIN</td><td>TC</td><td>TC-ÔN</td><td>TC</td><td>VĂN</td></tr>
                        <tr><td>3</td><td>TIN</td><td>ANH</td><td>-</td><td>TC</td><td>VĂN</td></tr>
                    </table>
                </div>`;
            }

            else if (phan === 'nghenghiep') {
                nd = `
                <div class="glow-box">
                    <h1 style="color:#00f5ff; text-align:center;">ĐỊNH HƯỚNG NGHỀ NGHIỆP</h1>
                    <div class="personal-section">
                        <h2>1. Hồ Nguyễn Gia Bảo - Kỹ thuật</h2>
                        <p>Hướng tới các ngành: Kỹ thuật Điện, Tự động hóa, Cơ điện tử.</p>
                        <a href="https://hieuveban.ueh.edu.vn/ket-qua-holland/5b029c6a-7ad8-4eab-1040-08de52afccee" class="link-them" target="_blank">Xem kết quả Holland của Bảo</a>
                    </div>
                    <div class="personal-section">
                        <h2>2. Trịnh Tuấn Anh - Sáng tạo & Thiết kế</h2>
                        <p>Hướng tới các ngành: Thiết kế đồ họa, 3D, Kiến trúc.</p>
                        <a href="https://hieuveban.ueh.edu.vn/ket-qua-holland/f7352255-878a-4756-103d-08de52afccee" class="link-them" target="_blank">Xem kết quả Holland của Tuấn Anh</a>
                    </div>
                </div>`;
            }

            v.innerHTML = nd + '<div class="footer">© 2026 - Nhóm 7 THPT Ngô Quyền</div>';
        }
    </script>
</body>
</html>
